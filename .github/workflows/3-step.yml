name: Step 3

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/3-step.md"
      - "StakeholderDocuments/**"
      - ".specific/memory/spec.md"

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"

jobs:
  validate_step_3:
    name: Validate Step 3 Completion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check spec.md file
        id: check-spec
        run: |
          # Verificar se o arquivo spec.md foi gerado
          if [ -f ".specific/memory/spec.md" ] || [ -f "spec.md" ]; then
            echo "✅ Arquivo spec.md encontrado"
            
            # Verificar qual arquivo existe e validar conteúdo
            spec_file=""
            if [ -f "spec.md" ]; then
              spec_file="spec.md"
            elif [ -f ".specific/memory/spec.md" ]; then
              spec_file=".specific/memory/spec.md"
            fi
            
            if [ -s "$spec_file" ]; then
              echo "✅ spec.md possui conteudo"
              echo "spec_generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ spec.md parece estar vazio"
              echo "spec_generated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Arquivo spec.md nao encontrado nos locais esperados"
            echo "spec_generated=false" >> "$GITHUB_OUTPUT"
          fi

  post_next_step_content:
    name: Postar conteúdo do próximo passo
    runs-on: ubuntu-latest
    needs: [validate_step_3]
    env:
      ISSUE_NUMBER: ${{ needs.validate_step_3.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/translations/watching-for-progress.md

      - name: Habilitar workflow do próximo passo
        run: |
          gh workflow enable "Step 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
