name: Step 6

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/6-step.md"
      - "src/**"
      - "*.csproj"
      - "Program.cs"

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1


  validate_step:
    name: Validate Step 6 Completion
    runs-on: ubuntu-latest
    needs: [find_exercise]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check implementation status
        id: check-implementation
        run: |
          # Verificar se há código fonte implementado
          source_files=false
          
          if [ -d "src" ] && [ "$(find src -type f -name '*.cs' | wc -l)" -gt 0 ]; then
            echo "✅ Arquivos C# encontrados em src/"
            source_files=true
          fi
          
          if [ -f "*.csproj" ] || [ "$(find . -maxdepth 1 -type f -name '*.csproj' | wc -l)" -gt 0 ]; then
            echo "✅ Arquivo de projeto C# encontrado"
            source_files=true
          fi
          
          if [ "$source_files" = true ]; then
            echo "implementation_progress=true" >> "$GITHUB_OUTPUT"
            echo "✅ Arquivos de implementacao detectados"
          else
            echo "implementation_progress=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Nenhum arquivo de implementacao detectado ainda"
          fi

  post_step_completion:
    name: Post Step 6 Completion
    runs-on: ubuntu-latest
    needs: [find_exercise, validate_step]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Post completion message
        run: |
          echo "✅ Todas as etapas do exercicio GitHub Spec Kit foram concluidas!"
          echo ""
          echo "Voce concluiu com sucesso:"
          echo "1. ✅ Inicializacao do GitHub Spec Kit"
          echo "2. ✅ Geracao do constitution.md"
          echo "3. ✅ Geracao do spec.md"
          echo "4. ✅ Geracao do plan.md"
          echo "5. ✅ Geracao do tasks.md"
          echo "6. ✅ Implementacao da aplicacao MVP"
          echo ""
          echo "Excelente trabalho! 🎉"

      - name: Disable current workflow
        run: |
          gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post_review_content:
    name: Publicar conteúdo da revisão
    needs: [find_exercise, validate_step, post_step_completion]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Obter templates de resposta
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Criar comentário - passo concluído - revisão final a seguir
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/lesson-review.md

      - name: Criar comentário - adicionar conteúdo da revisão
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: Desabilitar workflow atual
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finish_exercise:
    name: Finalizar Exercício
    needs: [find_exercise, validate_step, post_review_content]
    uses: skills/exercise-toolkit/.github/workflows/finish-exercise.yml@v0.8.1
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "Crie aplicações com o Copilot CLI"