name: Step 2

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/2-step.md"
      - "StakeholderDocuments/**"
      - ".specify/memory/constitution.md"

permissions:
  contents: read
  actions: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  validate_step_2:
    name: Validate Step 2 Completion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check StakeholderDocuments folder
        id: check-stakeholder-docs
        run: |
          # Verificar se a pasta StakeholderDocuments existe
          if [ -d "StakeholderDocuments" ]; then
            echo "✅ Pasta StakeholderDocuments encontrada"
            
            # Verificar se os arquivos necessários existem
            required_files=("ProjectGoals.md" "AppFeatures.md" "TechStack.md")
            all_found=true
            
            for file in "${required_files[@]}"; do
              if [ -f "StakeholderDocuments/$file" ]; then
                echo "✅ StakeholderDocuments/$file encontrado"
              else
                echo "❌ StakeholderDocuments/$file NAO encontrado"
                all_found=false
              fi
            done
            
            if [ "$all_found" = true ]; then
              echo "stakeholder_docs_ready=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Pasta StakeholderDocuments nao encontrada"
            echo "stakeholder_docs_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check constitution.md file
        id: check-constitution
        run: |
          # Verificar se o arquivo constitution.md foi gerado
          if [ -f ".specify/memory/constitution.md" ]; then
            echo "✅ Arquivo constitution.md encontrado"
            
            # Verificar se o arquivo não está vazio
            if [ -s ".specify/memory/constitution.md" ]; then
              echo "✅ constitution.md possui conteudo"
              echo "constitution_generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ constitution.md parece estar vazio"
              echo "constitution_generated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Arquivo constitution.md nao encontrado"
            echo "constitution_generated=false" >> "$GITHUB_OUTPUT"
          fi

  post_step_completion:
    name: Post Step 2 Completion
    runs-on: ubuntu-latest
    needs: [validate_step_2]
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Post completion message
        run: |
          echo "✅ Etapa 2 - Geração do constitution.md concluída!"
          echo ""
          echo "Validações realizadas:"
          echo "  ✓ Pasta StakeholderDocuments existe"
          echo "  ✓ Documentos do stakeholder estão presentes"
          echo "  ✓ Arquivo constitution.md foi gerado"
          echo ""
          echo "Próximo passo: Gerar o arquivo spec.md usando a documentação"

      - name: Enable next workflow step
        run: |
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
