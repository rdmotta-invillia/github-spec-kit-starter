name: Step 2

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/2-step.md"
      - "StakeholderDocuments/**"
      - ".specify/memory/constitution.md"

permissions:
  contents: read
  actions: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  validate_step_2:
    name: Validate Step 2 Completion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check StakeholderDocuments folder
        id: check-stakeholder-docs
        run: |
          # Verificar se a pasta StakeholderDocuments existe
          if [ -d "StakeholderDocuments" ]; then
            echo "✅ Pasta StakeholderDocuments encontrada"
            
            # Verificar se os arquivos necessários existem
            required_files=("ProjectGoals.md" "AppFeatures.md" "TechStack.md")
            all_found=true
            
            for file in "${required_files[@]}"; do
              if [ -f "StakeholderDocuments/$file" ]; then
                echo "✅ StakeholderDocuments/$file encontrado"
              else
                echo "❌ StakeholderDocuments/$file NAO encontrado"
                all_found=false
              fi
            done
            
            if [ "$all_found" = true ]; then
              echo "stakeholder_docs_ready=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Pasta StakeholderDocuments nao encontrada"
            echo "stakeholder_docs_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check constitution.md file
        id: check-constitution
        run: |
          # Verificar se o arquivo constitution.md foi gerado
          if [ -f ".specify/memory/constitution.md" ]; then
            echo "✅ Arquivo constitution.md encontrado"
            
            # Verificar se o arquivo não está vazio
            if [ -s ".specify/memory/constitution.md" ]; then
              echo "✅ constitution.md possui conteudo"
              echo "constitution_generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ constitution.md parece estar vazio"
              echo "constitution_generated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Arquivo constitution.md nao encontrado"
            echo "constitution_generated=false" >> "$GITHUB_OUTPUT"
          fi

  post_step_completion:
    name: Post Step 2 Completion
    runs-on: ubuntu-latest
    needs: [validate_step_2]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Post completion message
        run: |
          echo "✅ Etapa 2 - Geracao do constitution.md concluida!"
          echo ""
          echo "Próximo: Gerar o arquivo spec.md usando a documentação do stakeholder"

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # END: Check practical exercise

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise] # if check_step_work then "needs: [find_exercise, check_step_work]"
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v6
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.1

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
