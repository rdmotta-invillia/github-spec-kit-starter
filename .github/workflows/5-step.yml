name: Step 5

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/5-step.md"
      - ".specific/memory/tasks.md"
      - "tasks.md"

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_FILE: ".github/steps/6-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1


  validate_step:
    name: Validate Step 5 Completion
    runs-on: ubuntu-latest
    needs: [find_exercise]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tasks.md file
        id: check-tasks
        run: |
          # Verificar se o arquivo tasks.md foi gerado
          tasks_found=false
          if [ -f "tasks.md" ]; then
            tasks_found=true
            tasks_file="tasks.md"
          elif [ -f ".specific/memory/tasks.md" ]; then
            tasks_found=true
            tasks_file=".specific/memory/tasks.md"
          fi
          
          if [ "$tasks_found" = true ]; then
            echo "✅ Arquivo tasks.md encontrado"
            
            if [ -s "$tasks_file" ]; then
              echo "✅ tasks.md possui conteudo"
              # Verificar se contém tarefas definidas
              if grep -q "^## Task\|^### T[0-9]\|^- \[" "$tasks_file"; then
                echo "✅ tasks.md parece conter definicoes de tarefas"
              fi
              echo "tasks_generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ tasks.md parece estar vazio"
              echo "tasks_generated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Arquivo tasks.md nao encontrado"
            echo "tasks_generated=false" >> "$GITHUB_OUTPUT"
          fi

  post_next_step_content:
    name: Postar conteúdo do próximo passo
    runs-on: ubuntu-latest
    needs: [find_exercise, validate_step]
    env:
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/translations/watching-for-progress.md

      - name: Habilitar workflow do próximo passo
        run: |
          gh workflow enable "Step 6"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
