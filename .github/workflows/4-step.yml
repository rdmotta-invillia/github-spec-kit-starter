name: Step 4

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/4-step.md"
      - ".specific/memory/plan.md"
      - "plan.md"

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_5_FILE: ".github/steps/5-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue do Exercício
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  validate_step:
    name: Validate Step 4 Completion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check plan.md and related files
        id: check-plan
        run: |
          # Verificar se o arquivo plan.md foi gerado
          plan_found=false
          if [ -f "plan.md" ]; then
            plan_found=true
            plan_file="plan.md"
          elif [ -f ".specific/memory/plan.md" ]; then
            plan_found=true
            plan_file=".specific/memory/plan.md"
          fi
          
          if [ "$plan_found" = true ]; then
            echo "✅ Arquivo plan.md encontrado"
            
            if [ -s "$plan_file" ]; then
              echo "✅ plan.md possui conteudo"
            else
              echo "⚠️ plan.md parece estar vazio"
            fi
          else
            echo "❌ Arquivo plan.md nao encontrado"
          fi
          
          # Verificar se os arquivos auxiliares foram criados
          auxiliary_files=("research.md" "quickstart.md" "data-model.md")
          for file in "${auxiliary_files[@]}"; do
            if [ -f "$file" ] || [ -f ".specific/$file" ]; then
              echo "✅ $file encontrado"
            else
              echo "⚠️ $file nao encontrado (opcional)"
            fi
          done
          
          echo "plan_generated=true" >> "$GITHUB_OUTPUT"

  post_next_step_content:
    name: Postar conteúdo do próximo passo
    runs-on: ubuntu-latest
    needs: [validate_step]
    env:
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/translations/watching-for-progress.md

      - name: Habilitar workflow do próximo passo
        run: |
          gh workflow enable "Step 5"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
