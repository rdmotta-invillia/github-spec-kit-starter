name: Start Exercise

on:
  workflow_dispatch:
  # NOTE: Make sure the repository is a template before enabling this trigger.
  # push:
  #   branches:
  #     - main

permissions:
  contents: read
  actions: write

jobs:
  initialize_exercise:
    name: Initialize Exercise
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Post initialization message
        run: |
          echo "🚀 Bem-vindo ao exercício do GitHub Spec Kit!"
          echo ""
          echo "Este exercício vai ensinar você a usar o GitHub Spec Kit para desenvolvimento orientado por especificações."
          echo ""
          echo "Você vai aprender a:"
          echo "1. Inicializar o GitHub Spec Kit"
          echo "2. Gerar o constitution.md"
          echo "3. Gerar o spec.md"
          echo "4. Gerar o plan.md"
          echo "5. Gerar o tasks.md"
          echo "6. Implementar a aplicação MVP"
          echo ""
          echo "Vamos começar com o Passo 1!"

      - name: Enable Step 1 workflow
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
