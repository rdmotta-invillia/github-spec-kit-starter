name: Step 1

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/steps/1-step.md"
  # Common event triggers: pull_request, push, issues, issue_comment (feel free to experiment)
  # Docs: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows

permissions:
  contents: read
  actions: write

env:
  STEP_2_FILE: ".github/steps/2-step.md"
  SPECIFY_INIT_SUCCESS: "false"

jobs:
  validate_step_1:
    name: Validate Step 1 Completion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check GitHub Spec Kit initialization
        id: check-speckit
        run: |
          # Verificar se a pasta .github/agents existe
          if [ -d ".github/agents" ]; then
            echo "✅ pasta .github/agents encontrada"
            agents_found=true
          else
            echo "❌ pasta .github/agents não encontrada"
            agents_found=false
          fi
          
          # Verificar se a pasta .specific existe
          if [ -d ".specific" ]; then
            echo "✅ pasta .specific encontrada"
            specific_found=true
          else
            echo "❌ pasta .specific não encontrada"
            specific_found=false
          fi
          
          # Verificar se há arquivos de agentes
          if [ -f ".github/agents"/*.md ]; then
            echo "✅ arquivos de agentes encontrados"
            agent_files_found=true
          else
            echo "❌ nenhum arquivo de agente encontrado"
            agent_files_found=false
          fi
          
          # Define o resultado
          if [ "$agents_found" = true ] && [ "$specific_found" = true ]; then
            echo "speckit_initialized=true" >> "$GITHUB_OUTPUT"
            echo "✅ O GitHub Spec Kit parece estar inicializado"
          else
            echo "speckit_initialized=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ O GitHub Spec Kit pode nao estar totalmente inicializado"
          fi

  post_step_completion:
    name: Post Step 1 Completion
    runs-on: ubuntu-latest
    needs: [validate_step_1]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Post completion message
        run: |
          echo "✅ Etapa 1 - Inicializacao do GitHub Spec Kit concluida!"
          echo ""
          echo "Próximo: Etapa 2 - Gerar a `constitution.md` para o stakeholder"

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 2"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
